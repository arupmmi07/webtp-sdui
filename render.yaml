# Render.com Blueprint - SDUI Runtime Renderer (Node.js / Vite)
# Deploy: New > Blueprint, connect repo. Delete any existing Python service first.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: sdui-runtime-renderer
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "20"
    routes:
      # SPA: serve index.html for all routes (React Router)
      - type: rewrite
        source: /*
        destination: /index.html
