# LiteLLM Configuration
# Unified LLM gateway with automatic fallbacks and load balancing

model_list:
  # Primary: Anthropic Claude
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: ${ANTHROPIC_API_KEY}
      timeout: 60
      max_retries: 3
  
  # Fallback 1: OpenAI GPT-4 (if Claude fails)
  - model_name: gpt-4-fallback
    litellm_params:
      model: gpt-4-turbo
      api_key: ${OPENAI_API_KEY}
      timeout: 60
      max_retries: 2
  
  # Fallback 2: Google Gemini (if both fail)
  - model_name: gemini-fallback
    litellm_params:
      model: gemini/gemini-pro
      api_key: ${GEMINI_API_KEY}
      timeout: 60
      max_retries: 2
  
  # Local/Development: Ollama (free, no API key)
  - model_name: ollama-local
    litellm_params:
      model: ollama/llama2
      api_base: http://localhost:11434
      timeout: 120

# Router Configuration
router_settings:
  # Automatic fallback chain
  fallbacks:
    - claude-sonnet
    - gpt-4-fallback
    - gemini-fallback
  
  # Load balancing (if multiple instances)
  routing_strategy: simple-shuffle  # Options: simple-shuffle, least-busy, latency-based
  
  # Rate limiting
  rpm: 500  # Requests per minute
  tpm: 100000  # Tokens per minute
  
  # Caching (reduce costs)
  cache:
    type: redis  # Options: redis, disk, memory
    ttl: 3600  # Cache TTL in seconds
  
  # Retries
  num_retries: 3
  timeout: 60
  
  # Cost tracking
  track_cost_per_model: true

# Default model to use
default_model: claude-sonnet

# LangFuse Integration
langfuse:
  enabled: true
  public_key: ${LANGFUSE_PUBLIC_KEY}
  secret_key: ${LANGFUSE_SECRET_KEY}
  host: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
  
  # What to track
  trace_requests: true
  trace_responses: true
  track_usage: true
  track_costs: true
  
  # Tags for filtering in LangFuse UI
  default_tags:
    - therapist-replacement
    - production
    - smart-scheduling

# Environment-specific settings
environments:
  development:
    default_model: ollama-local
    langfuse:
      enabled: false
  
  staging:
    default_model: claude-sonnet
    langfuse:
      enabled: true
      default_tags:
        - therapist-replacement
        - staging
  
  production:
    default_model: claude-sonnet
    fallbacks_enabled: true
    langfuse:
      enabled: true
      default_tags:
        - therapist-replacement
        - production

# Prompt Management via LangFuse
prompts:
  # Prompts are managed in LangFuse UI, referenced by name
  use_langfuse_prompts: true
  
  # Prompt names (defined in LangFuse)
  prompt_names:
    orchestrator_system: "therapist-replacement-orchestrator-v1"
    matching_agent: "smart-scheduling-matching-v1"
    scoring_agent: "smart-scheduling-scoring-v1"
    consent_agent: "patient-engagement-consent-v1"
    backfill_agent: "smart-scheduling-backfill-v1"

# Monitoring & Alerts
monitoring:
  log_level: INFO
  log_requests: true
  log_responses: false  # Don't log full responses (can be large)
  
  # Alert thresholds
  alerts:
    error_rate_threshold: 0.05  # Alert if >5% errors
    latency_threshold_ms: 5000  # Alert if >5s latency
    cost_threshold_daily: 100   # Alert if daily cost >$100




